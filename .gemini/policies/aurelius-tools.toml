# Aurelius - Tool Approval Policy
# Targeting both 'local_shell' and 'run_shell_command' for compatibility.

[[rule]]
toolName = ["shell", "Shell", "local_shell", "run_shell_command"]
commandPrefix = ["ls", "mkdir", "touch", "mv", "cp", "rm", "grep", "sed", "cat", "find", "git status", "git diff", "git log", "git show", "git checkout", "npm test", "npm run lint", "npx"]
decision = "allow"
priority = 999

[[rule]]
toolName = ["read_file", "write_file", "replace", "edit", "list_directory", "glob", "search_file_content"]
decision = "allow"
priority = 999