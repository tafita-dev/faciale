services:
  api:
    build: ./backend
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      - mongodb
      - qdrant

  mongodb:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  qdrant_data:
